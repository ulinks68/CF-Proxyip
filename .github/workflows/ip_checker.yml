name: IP Checker

# 加上你图片中的防并发抢占核心配置
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch: # 保留手动触发
  schedule:
    # 使用避开高峰的 43 分，每 3 小时自动执行一次
    - cron: '13 */3 * * *'

permissions:
  contents: write
  actions: read

jobs:
  check-ips:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dnspython requests

      - name: List directory contents (before)
        run: |
          dir
          if (Test-Path "CloudflareScanner") { dir CloudflareScanner } else { Write-Host "CloudflareScanner 目录不存在" }

      - name: Run IP checker script
        run: python DNS2Geo.py

      - name: List directory contents (after)
        run: |
          dir
          if (Test-Path "CloudflareScanner") { dir CloudflareScanner } else { Write-Host "CloudflareScanner 目录不存在" }

      # 自动提交并推送结果
      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update IP/country info results'
          branch: main # 确保这是你的默认分支名
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
